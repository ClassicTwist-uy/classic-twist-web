<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evento — Classic Twist</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400&family=Fraunces:ital,opsz,wght@1,9..144,200;1,9..144,300&family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

:root {
  --rojo:    #D4232A;
  --negro:   #111010;
  --blanco:  #FFFFFF;
  --gris-txt:#7A7370;
  --linea:   #E8E4E0;
}

body {
  background: var(--blanco);
  color: var(--negro);
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
}

/* ══ NAV ══ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 48px;
  background: rgba(255,255,255,0.96); backdrop-filter: blur(12px);
}
.nav-logo {
  text-decoration: none; display: flex; flex-direction: column;
  line-height: 1; gap: 2px;
}
.nav-logo .l-c {
  font-family: 'Unbounded', sans-serif; font-weight: 200;
  font-size: 9.5px; letter-spacing: 0.26em; text-transform: uppercase;
  color: rgba(17,16,16,0.4);
}
.nav-logo .l-twist-row { display: flex; align-items: center; gap: 5px; }
.nav-logo .l-dots-v { display: flex; flex-direction: column; gap: 2px; }
.nav-logo .l-dot-y, .nav-logo .l-dot-r { width: 4px; height: 4px; border-radius: 50%; }
.nav-logo .l-dot-y { background: #FFD600; }
.nav-logo .l-dot-r { background: var(--rojo); }
.nav-logo .l-t {
  font-family: 'Unbounded', sans-serif; font-weight: 200;
  font-size: 15px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--negro);
}
.nav-links { list-style: none; display: flex; gap: 32px; align-items: center; }
.nav-links li { position: relative; }
.nav-links a {
  font-family: 'DM Sans', sans-serif; font-size: 11px;
  font-weight: 400; letter-spacing: 0.10em; text-transform: uppercase;
  color: var(--negro); text-decoration: none; transition: color 0.2s;
}
.nav-links a:hover { color: var(--rojo); }
.nav-links li a.nav-cta { background: none; color: var(--negro); padding: 9px 20px; }
.nav-links li a.nav-cta:hover { color: var(--rojo); }
.nav-links li .nav-oval {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none; overflow: visible;
}

/* ══ HEADER EVENTO ══ */
.ev-header {
  padding: 130px 56px 48px;
  display: flex; align-items: flex-end;
  justify-content: space-between;
  border-bottom: 1px solid var(--linea);
  gap: 24px; flex-wrap: wrap;
}
.ev-header-left { display: flex; flex-direction: column; gap: 10px; }
.ev-cat {
  font-size: 10px; font-weight: 400;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gris-txt);
  display: flex; align-items: center; gap: 6px;
}
.ev-cat::before { content: '○'; font-size: 8px; }
.ev-title {
  font-family: 'DM Sans', sans-serif; font-weight: 200;
  font-size: clamp(40px, 6vw, 80px);
  letter-spacing: -0.03em; color: var(--negro); line-height: 0.95;
}
.ev-header-right { display: flex; align-items: center; gap: 32px; }
.ev-count-box {
  text-align: right;
}
.ev-count-num {
  font-family: 'DM Sans', sans-serif; font-weight: 200;
  font-size: 40px; letter-spacing: -0.02em;
  color: rgba(17,16,16,0.15); line-height: 1;
}
.ev-count-lbl {
  font-size: 10px; font-weight: 400; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--gris-txt);
}
.ev-back {
  font-family: 'DM Sans', sans-serif; font-size: 11px;
  font-weight: 400; letter-spacing: 0.10em; text-transform: uppercase;
  color: var(--gris-txt); text-decoration: none;
  display: flex; align-items: center; gap: 8px;
  transition: color 0.2s;
  position: relative;
  padding: 10px 20px;
}
.ev-back:hover { color: var(--negro); }
.ev-back::before { content: '←'; }
.ev-back .back-oval {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none; overflow: visible;
}

/* ══ GRID EDITORIAL ══ */
/* ══ GRID — columnas masonry sin recorte ══ */
.ev-grid {
  padding: 40px 56px 80px;
  columns: 2;
  column-gap: 12px;
}

.ph {
  break-inside: avoid;
  margin-bottom: 12px;
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  background: var(--linea);
  display: block;
}
.ph img {
  width: 100%;
  height: auto;       /* altura natural — sin recorte */
  display: block;
  transition: transform 0.6s ease;
}
.ph:hover img { transform: scale(1.02); }

/* ══ LIGHTBOX ══ */
.lb {
  display: none; position: fixed; inset: 0;
  background: rgba(17,16,16,0.97); z-index: 500;
  flex-direction: column;
}
.lb.open { display: flex; }
.lb-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 40px; flex-shrink: 0;
}
.lb-counter { font-size: 11px; font-weight: 300; color: rgba(255,255,255,0.35); }
.lb-close {
  font-size: 28px; color: rgba(255,255,255,0.4);
  cursor: pointer; background: none; border: none; line-height: 1; padding: 4px 8px;
  transition: color 0.2s;
}
.lb-close:hover { color: var(--blanco); }
.lb-main {
  flex: 1; position: relative; display: flex;
  align-items: center; justify-content: center;
  overflow: hidden; min-height: 0;
}
.lb-img {
  max-width: 100%; max-height: 100%;
  object-fit: contain; padding: 0 80px;
  border-radius: 8px;
}
.lb-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: rgba(255,255,255,0.3);
  font-size: 48px; cursor: pointer; padding: 16px 28px; line-height: 1;
  transition: color 0.2s;
}
.lb-nav:hover { color: var(--blanco); }
.lb-prev { left: 0; }
.lb-next { right: 0; }
.lb-strip {
  display: flex; gap: 6px; padding: 16px 40px 24px;
  overflow-x: auto; flex-shrink: 0; scrollbar-width: none;
}
.lb-strip::-webkit-scrollbar { display: none; }
.lb-thumb {
  width: 56px; height: 56px; object-fit: cover;
  flex-shrink: 0; cursor: pointer; border-radius: 6px;
  opacity: 0.3; transition: opacity 0.2s; border: 2px solid transparent;
}
.lb-thumb:hover { opacity: 0.7; }
.lb-thumb.active { opacity: 1; border-color: var(--blanco); }

/* ══ FOOTER ══ */
footer {
  padding: 32px 56px; border-top: 1px solid var(--linea);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.footer-tagline {
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 300;
  font-size: 13px; color: rgba(17,16,16,0.4);
}
.footer-tagline em { color: var(--rojo); font-style: normal; }
.footer-copy { font-size: 11px; font-weight: 300; letter-spacing: 0.06em; color: rgba(17,16,16,0.3); }

/* ══ HAMBURGER ══ */
.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; }
.hamburger span { display: block; width: 24px; height: 1.5px; background: var(--negro); transition: transform 0.3s, opacity 0.3s; }
.hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
.mobile-menu {
  display: none; position: fixed; inset: 0;
  background: var(--blanco); z-index: 190;
  flex-direction: column; justify-content: center;
  align-items: flex-start; padding: 80px 48px 48px;
}
.mobile-menu.open { display: flex; }
.mobile-menu a {
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 300;
  font-size: clamp(32px, 7vw, 52px); color: var(--negro);
  text-decoration: none; padding: 10px 0;
  border-bottom: 1px solid var(--linea); width: 100%;
}
.mobile-menu a:hover { color: var(--rojo); }
.mobile-menu .mm-cta {
  margin-top: 24px; background: var(--rojo); color: var(--blanco) !important;
  font-family: 'DM Sans', sans-serif; font-style: normal;
  font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase;
  border-radius: 100px; padding: 14px 32px !important;
  width: auto; border: none;
}

@media (max-width: 900px) {
  nav { padding: 14px 24px; }
  .nav-links { display: none; }
  .hamburger { display: flex; }
  .ev-header { padding: 100px 24px 36px; }
  .ev-grid { padding: 24px 24px 60px; columns: 1; }
  .ph { margin-bottom: 8px; border-radius: 10px; }
  footer { padding: 28px 24px; flex-direction: column; align-items: flex-start; }
  .lb-img { padding: 0 48px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="l-c">Classic</span>
    <span class="l-twist-row">
      <span class="l-dots-v"><span class="l-dot-y"></span><span class="l-dot-r"></span></span>
      <span class="l-t">Twist</span>
    </span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html#sobre">Sobre Classic</a></li>
    <li><a href="index.html#servicios">Servicios</a></li>
    <li><a href="galeria.html">Galería</a></li>
    <li><a href="https://u5kjy.share.hsforms.com/244sGq6KZTMa5v41N2JdcyQ" target="_blank" class="nav-cta">Contacto</a></li>
  </ul>
  <div class="hamburger" id="ham" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
</nav>

<div class="mobile-menu" id="mobile-menu">
  <a href="index.html#sobre" onclick="toggleMenu()">Sobre Classic</a>
  <a href="index.html#servicios" onclick="toggleMenu()">Servicios</a>
  <a href="galeria.html" onclick="toggleMenu()">Galería</a>
  <a href="https://u5kjy.share.hsforms.com/244sGq6KZTMa5v41N2JdcyQ" target="_blank" onclick="toggleMenu()" class="mm-cta">Contacto</a>
</div>

<!-- Header del evento -->
<div class="ev-header">
  <div class="ev-header-left">
    <span class="ev-cat" id="ev-cat"></span>
    <h1 class="ev-title" id="ev-title"></h1>
  </div>
  <div class="ev-header-right">
    <div class="ev-count-box">
      <div class="ev-count-num" id="ev-num"></div>
      <div class="ev-count-lbl">fotografías</div>
    </div>
    <a href="galeria.html" class="ev-back">Volver</a>
  </div>
</div>

<!-- Grid de fotos generado por JS -->
<div class="ev-grid" id="ev-grid"></div>

<!-- Footer -->
<footer>
  <a href="index.html" class="nav-logo">
    <span class="l-c">Classic</span>
    <span class="l-twist-row">
      <span class="l-dots-v"><span class="l-dot-y"></span><span class="l-dot-r"></span></span>
      <span class="l-t">Twist</span>
    </span>
  </a>
  <span class="footer-tagline">Dirección creativa aplicada al <em>líquido.</em></span>
  <span class="footer-copy">© 2026 Classic Twist · Uruguay</span>
</footer>

<!-- Lightbox -->
<div class="lb" id="lb">
  <div class="lb-header">
    <span class="lb-counter" id="lb-counter"></span>
    <button class="lb-close" onclick="lbClose()">×</button>
  </div>
  <div class="lb-main">
    <button class="lb-nav lb-prev" onclick="lbNav(-1)">‹</button>
    <img class="lb-img" id="lb-img" src="" alt="">
    <button class="lb-nav lb-next" onclick="lbNav(1)">›</button>
  </div>
  <div class="lb-strip" id="lb-strip"></div>
</div>

<script>
// Leer params de la URL
const params = new URLSearchParams(window.location.search);
const ev     = params.get('e')   || 'vichy';
const title  = params.get('n')   || 'Evento';
const cat    = params.get('cat') || 'Classic Twist';
const count  = parseInt(params.get('c') || '6');

// Orientaciones conocidas (landscape = true)
const isLandscape = {
  casamiento: true, exat: true, fixed: true,
  hym: false, ibm: false, loreal: false,
  roche: true, samsung: false, vichy: false
};
const land = isLandscape[ev] || false;

// Poblar header
document.getElementById('ev-cat').textContent   = cat;
document.getElementById('ev-title').textContent = title;
document.getElementById('ev-num').textContent   = String(count).padStart(2, '0');
document.title = `${title} — Classic Twist`;

// Construir grid
const grid = document.getElementById('ev-grid');
const photos = [];

for (let i = 1; i <= count; i++) {
  const src = `galeria/${ev}/${String(i).padStart(2,'0')}.jpg`;
  photos.push(src);

  const ph = document.createElement('div');
  ph.className = 'ph';
  ph.dataset.idx = i - 1;

  const img = document.createElement('img');
  img.src = src;
  img.alt = title;
  img.loading = 'lazy';

  ph.appendChild(img);
  ph.addEventListener('click', () => lbOpen(i - 1));
  grid.appendChild(ph);
}

// ── Lightbox ──
const lb      = document.getElementById('lb');
const lbImg   = document.getElementById('lb-img');
const lbCtr   = document.getElementById('lb-counter');
const lbStrip = document.getElementById('lb-strip');
let lbIdx = 0;

// Construir miniaturas una vez
photos.forEach((src, i) => {
  const t = document.createElement('img');
  t.src = src; t.className = 'lb-thumb'; t.loading = 'lazy';
  t.addEventListener('click', () => lbSet(i));
  lbStrip.appendChild(t);
});

function lbOpen(i) { lb.classList.add('open'); document.body.style.overflow='hidden'; lbSet(i); }
function lbClose() { lb.classList.remove('open'); document.body.style.overflow=''; }
function lbSet(i) {
  lbIdx = i;
  lbImg.src = photos[i];
  lbCtr.textContent = `${i+1} / ${photos.length}`;
  document.querySelectorAll('.lb-thumb').forEach((t,j) => t.classList.toggle('active', j===i));
  document.querySelectorAll('.lb-thumb')[i]?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}
function lbNav(dir) { lbSet((lbIdx + dir + photos.length) % photos.length); }
lb.addEventListener('click', e => { if (e.target===lb) lbClose(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key==='Escape')     lbClose();
  if (e.key==='ArrowRight') lbNav(1);
  if (e.key==='ArrowLeft')  lbNav(-1);
});

// Hamburger
function toggleMenu() {
  document.getElementById('ham').classList.toggle('open');
  document.getElementById('mobile-menu').classList.toggle('open');
}

// ── Elipse SVG en nav + botón Volver ──
document.fonts.ready.then(() => {
  const ns = 'http://www.w3.org/2000/svg';

  // Nav links
  const allLis = Array.from(document.querySelectorAll('.nav-links li'));
  let ctaEl = null, ctaLen = 0;
  allLis.forEach(li => {
    const link  = li.querySelector('a');
    const isCta = link.classList.contains('nav-cta');
    const px = isCta ? 18 : 16, py = isCta ? 10 : 9;
    const lw = link.offsetWidth, lh = link.offsetHeight;
    const W = lw+px*2, H = lh+py*2, cx = W/2, cy = H/2, rx = W/2-2, ry = H/2-1;

    const svg = document.createElementNS(ns,'svg');
    svg.setAttribute('width',W); svg.setAttribute('height',H);
    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
    svg.classList.add('nav-oval');
    const ell = document.createElementNS(ns,'ellipse');
    ell.setAttribute('cx',cx); ell.setAttribute('cy',cy);
    ell.setAttribute('rx',rx); ell.setAttribute('ry',ry);
    ell.setAttribute('fill','none'); ell.setAttribute('stroke','#D4232A');
    ell.setAttribute('stroke-width','1.5'); ell.setAttribute('stroke-linecap','round');
    svg.appendChild(ell); li.appendChild(svg);

    const len = Math.PI*(3*(rx+ry)-Math.sqrt((3*rx+ry)*(rx+3*ry)));
    ell.style.strokeDasharray = len;
    if (isCta) {
      ell.style.strokeDashoffset = 0;
      ell.style.transition = 'stroke-dashoffset 0.35s ease';
      ctaEl = ell; ctaLen = len;
    } else {
      ell.style.strokeDashoffset = len;
      ell.style.transition = 'stroke-dashoffset 0.45s cubic-bezier(0.4,0,0.2,1)';
      li.addEventListener('mouseenter', () => { ell.style.strokeDashoffset=0; if(ctaEl) ctaEl.style.strokeDashoffset=ctaLen; });
      li.addEventListener('mouseleave', () => { ell.style.strokeDashoffset=len; if(ctaEl) ctaEl.style.strokeDashoffset=0; });
    }
  });

  // Botón Volver
  const back = document.querySelector('.ev-back');
  if (back) {
    const px=20, py=10;
    const lw=back.offsetWidth, lh=back.offsetHeight;
    const W=lw+px*2, H=lh+py*2, cx=W/2, cy=H/2, rx=W/2-2, ry=H/2-1;
    const svg = document.createElementNS(ns,'svg');
    svg.setAttribute('width',W); svg.setAttribute('height',H);
    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
    svg.classList.add('back-oval');
    const ell = document.createElementNS(ns,'ellipse');
    ell.setAttribute('cx',cx); ell.setAttribute('cy',cy);
    ell.setAttribute('rx',rx); ell.setAttribute('ry',ry);
    ell.setAttribute('fill','none'); ell.setAttribute('stroke','#D4232A');
    ell.setAttribute('stroke-width','1.5'); ell.setAttribute('stroke-linecap','round');
    svg.appendChild(ell); back.appendChild(svg);
    const len = Math.PI*(3*(rx+ry)-Math.sqrt((3*rx+ry)*(rx+3*ry)));
    ell.style.strokeDasharray = len;
    ell.style.strokeDashoffset = 0;
    ell.style.transition = 'stroke-dashoffset 0.35s ease';
  }
});
</script>

</body>
</html>
