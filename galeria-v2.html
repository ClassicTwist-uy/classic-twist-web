<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería — Classic Twist</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400&family=Fraunces:ital,opsz,wght@1,9..144,200;1,9..144,300&family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

:root {
  --rojo:    #D4232A;
  --negro:   #111010;
  --blanco:  #FFFFFF;
  --gris-txt:#7A7370;
  --linea:   #E8E4E0;
}

body {
  background: var(--blanco);
  color: var(--negro);
  font-family: 'DM Sans', sans-serif;
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}

/* ══ NAV ══ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 48px;
  background: rgba(255,255,255,0.96); backdrop-filter: blur(12px);
}
.nav-logo { text-decoration: none; display: flex; flex-direction: column; line-height: 1; gap: 2px; }
.nav-logo .l-c { font-family: 'Unbounded',sans-serif; font-weight:200; font-size:9.5px; letter-spacing:.26em; text-transform:uppercase; color:rgba(17,16,16,.4); }
.nav-logo .l-twist-row { display:flex; align-items:center; gap:5px; }
.nav-logo .l-dots-v { display:flex; flex-direction:column; gap:2px; }
.nav-logo .l-dot-y, .nav-logo .l-dot-r { width:4px; height:4px; border-radius:50%; }
.nav-logo .l-dot-y { background:#FFD600; }
.nav-logo .l-dot-r { background:var(--rojo); }
.nav-logo .l-t { font-family:'Unbounded',sans-serif; font-weight:200; font-size:15px; letter-spacing:.18em; text-transform:uppercase; color:var(--negro); }
.nav-links { list-style:none; display:flex; gap:32px; align-items:center; }
.nav-links a { font-size:12px; font-weight:400; letter-spacing:.04em; color:var(--negro); text-decoration:none; transition:color .2s; }
.nav-links a:hover, .nav-links a.active { color:var(--rojo); }
.nav-cta { border:1px solid var(--negro); border-radius:100px; padding:8px 20px !important; transition:background .2s,color .2s !important; }
.nav-cta:hover { background:var(--negro) !important; color:var(--blanco) !important; }

/* ══ LAYOUT ══ */
.gl-page { display:flex; flex-direction:column; height:100vh; padding-top:72px; }

.gl-top {
  flex: 1; display: flex; flex-direction: column;
  justify-content: flex-end; padding: 0 56px 44px;
}
.gl-eyebrow { font-size:10px; font-weight:400; letter-spacing:.22em; text-transform:uppercase; color:var(--gris-txt); margin-bottom:10px; }
.gl-title { font-family:'DM Sans',sans-serif; font-weight:200; font-size:clamp(32px,4.5vw,62px); letter-spacing:-.03em; color:var(--negro); line-height:1; }

/* ══ CARRUSEL ══ */
.carousel-wrap {
  overflow-x: scroll;
  scrollbar-width: none;
  padding-bottom: 56px;
  /* Máscara desvanecimiento en bordes */
  -webkit-mask-image: linear-gradient(to right, transparent 0%, black 7%, black 93%, transparent 100%);
  mask-image: linear-gradient(to right, transparent 0%, black 7%, black 93%, transparent 100%);
  cursor: grab;
}
.carousel-wrap::-webkit-scrollbar { display: none; }
.carousel-wrap:active { cursor: grabbing; }

.carousel {
  display: flex;
  align-items: flex-end;
  gap: 14px;
  padding: 24px 50vw 0; /* padding grande para que el primer/último ítem pueda centrarse */
  width: max-content;
}

/* ── Cada item ── */
.ev-item {
  display: flex; flex-direction: column;
  align-items: flex-start; gap: 8px;
  cursor: pointer; flex-shrink: 0;
  transition: opacity 0.35s ease;
  user-select: none;
}

.ev-label {
  font-size: 10px; font-weight: 400; letter-spacing: .07em;
  color: var(--gris-txt); white-space: nowrap;
  display: flex; align-items: center; gap: 5px;
  opacity: 0.5; transition: color .3s, opacity .3s;
}
.ev-label::before { content: '○'; font-size: 8px; }
.ev-item.is-active .ev-label { color: var(--negro); opacity: 1; }

/* ── Tarjeta ── */
.ev-card {
  border-radius: 14px;
  overflow: hidden;
  background: var(--linea);
  width: 200px;
  height: 280px;
  flex-shrink: 0;
  transition:
    width  0.5s cubic-bezier(0.34, 1.05, 0.64, 1),
    height 0.5s cubic-bezier(0.34, 1.05, 0.64, 1),
    box-shadow 0.4s ease;
}

/* Activa */
.ev-item.is-active .ev-card {
  height: 390px;
  box-shadow: 0 24px 56px rgba(17,16,16,.18);
}
/* Adyacente */
.ev-item.is-near .ev-card {
  height: 330px;
}
/* Segunda adyacente */
.ev-item.is-near2 .ev-card {
  height: 300px;
}

.ev-card img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  transition: transform .6s ease;
  pointer-events: none;
}
.ev-item.is-active .ev-card img { transform: scale(1.04); }

/* ══ HAMBURGER / MOBILE ══ */
.hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:8px; }
.hamburger span { display:block; width:24px; height:1.5px; background:var(--negro); transition:transform .3s,opacity .3s; }
.hamburger.open span:nth-child(1) { transform:translateY(6.5px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity:0; }
.hamburger.open span:nth-child(3) { transform:translateY(-6.5px) rotate(-45deg); }
.mobile-menu { display:none; position:fixed; inset:0; background:var(--blanco); z-index:190; flex-direction:column; justify-content:center; align-items:flex-start; padding:80px 48px 48px; }
.mobile-menu.open { display:flex; }
.mobile-menu a { font-family:'Fraunces',serif; font-style:italic; font-weight:300; font-size:clamp(32px,7vw,52px); color:var(--negro); text-decoration:none; padding:10px 0; border-bottom:1px solid var(--linea); width:100%; }
.mobile-menu a:hover { color:var(--rojo); }
.mobile-menu .mm-cta { margin-top:24px; background:var(--rojo); color:var(--blanco) !important; font-family:'DM Sans',sans-serif; font-style:normal; font-size:13px; letter-spacing:.08em; text-transform:uppercase; border-radius:100px; padding:14px 32px !important; width:auto; border:none; }

@media (max-width: 900px) {
  html, body { overflow: auto; }
  .gl-page { height: auto; }
  nav { padding: 14px 24px; }
  .nav-links { display: none; }
  .hamburger { display: flex; }
  .gl-top { padding: 0 24px 32px; min-height: 28vh; }
  .carousel-wrap { -webkit-mask-image: none; mask-image: none; padding-bottom: 40px; }
  .carousel { padding: 16px 24px 0; }
  .ev-card { width: 150px; height: 210px; }
  .ev-item.is-active .ev-card { height: 290px; }
  .ev-item.is-near .ev-card { height: 250px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="l-c">Classic</span>
    <span class="l-twist-row">
      <span class="l-dots-v"><span class="l-dot-y"></span><span class="l-dot-r"></span></span>
      <span class="l-t">Twist</span>
    </span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html#sobre">Sobre Classic</a></li>
    <li><a href="index.html#servicios">Servicios</a></li>
    <li><a href="galeria.html" class="active">Galería</a></li>
    <li><a href="https://u5kjy.share.hsforms.com/244sGq6KZTMa5v41N2JdcyQ" target="_blank" class="nav-cta">Contacto</a></li>
  </ul>
  <div class="hamburger" id="ham" onclick="toggleMenu()"><span></span><span></span><span></span></div>
</nav>

<div class="mobile-menu" id="mobile-menu">
  <a href="index.html#sobre" onclick="toggleMenu()">Sobre Classic</a>
  <a href="index.html#servicios" onclick="toggleMenu()">Servicios</a>
  <a href="galeria.html" onclick="toggleMenu()">Galería</a>
  <a href="https://u5kjy.share.hsforms.com/244sGq6KZTMa5v41N2JdcyQ" target="_blank" onclick="toggleMenu()" class="mm-cta">Contacto</a>
</div>

<div class="gl-page">
  <div class="gl-top">
    <div class="gl-eyebrow">Classic Twist</div>
    <h1 class="gl-title">Nuestros trabajos</h1>
  </div>
  <div class="carousel-wrap" id="wrap">
    <div class="carousel" id="carousel"></div>
  </div>
</div>

<script>
const EVENTS = [
  { event:'casamiento', title:'Casamiento',     cat:'Evento privado',          count:5 },
  { event:'exat',       title:'Exat',           cat:'Evento corporativo',      count:5 },
  { event:'fixed',      title:'Fixed',          cat:'Evento privado',          count:7 },
  { event:'hym',        title:'HYM',            cat:'Evento corporativo',      count:6 },
  { event:'ibm',        title:'IBM',            cat:'Evento corporativo',      count:4 },
  { event:'loreal',     title:"L'Oréal",        cat:'Lanzamiento de producto', count:6 },
  { event:'roche',      title:'La Roche-Posay', cat:'Lanzamiento de producto', count:6 },
  { event:'samsung',    title:'Samsung',        cat:'Lanzamiento de producto', count:5 },
  { event:'vichy',      title:'Vichy',          cat:'Lanzamiento de producto', count:9 },
];

const N      = EVENTS.length;
const COPIES = 3;
const wrap   = document.getElementById('wrap');
const carousel = document.getElementById('carousel');

let allItems  = [];
let activeGlobalIdx = N + 4; // empieza centrado en el set del medio

// ── Construir 3 copias de los items ──
for (let copy = 0; copy < COPIES; copy++) {
  EVENTS.forEach((ev, i) => {
    const globalIdx = copy * N + i;

    const item = document.createElement('div');
    item.className = 'ev-item';
    item.dataset.real  = i;
    item.dataset.global = globalIdx;

    const label = document.createElement('span');
    label.className = 'ev-label';
    label.textContent = ev.title;

    const card = document.createElement('div');
    card.className = 'ev-card';

    const img = document.createElement('img');
    img.src = `galeria/${ev.event}/portada.jpg`;
    img.alt = ev.title;
    img.loading = copy === 1 ? 'eager' : 'lazy';

    card.appendChild(img);
    item.appendChild(label);
    item.appendChild(card);
    carousel.appendChild(item);
    allItems.push(item);
  });
}

// ── Actualizar clases de tamaño/opacidad ──
function updateClasses(activeGlobal) {
  allItems.forEach((item, i) => {
    // Distancia en términos de índice real (circular)
    const ri = i % N;
    const ra = activeGlobal % N;
    let dist = Math.abs(ri - ra);
    if (dist > N / 2) dist = N - dist;

    item.classList.toggle('is-active', dist === 0);
    item.classList.toggle('is-near',   dist === 1);
    item.classList.toggle('is-near2',  dist === 2);
    item.style.opacity =
      dist === 0 ? '1'    :
      dist === 1 ? '0.82' :
      dist === 2 ? '0.58' :
      dist === 3 ? '0.36' : '0.2';
  });
}

// ── Centrar un item — animación manual con velocidad controlada ──
let scrollAnim = null;

function centerItem(globalIdx, instant = false) {
  const item = allItems[globalIdx];
  if (!item) return;
  const itemCenter = item.offsetLeft + item.offsetWidth / 2;
  const wrapCenter = wrap.offsetWidth / 2;
  const target = Math.round(itemCenter - wrapCenter);

  if (instant) { wrap.scrollLeft = target; return; }

  // Cancelar animación anterior
  if (scrollAnim) cancelAnimationFrame(scrollAnim);

  const DURATION = 820; // ms — más lento y elegante
  const startScroll = wrap.scrollLeft;
  const distance = target - startScroll;
  const startTime = performance.now();

  function easeInOutQuart(t) {
    return t < 0.5 ? 8*t*t*t*t : 1 - Math.pow(-2*t+2, 4)/2;
  }

  function step(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / DURATION, 1);
    wrap.scrollLeft = startScroll + distance * easeInOutQuart(progress);
    if (progress < 1) scrollAnim = requestAnimationFrame(step);
    else scrollAnim = null;
  }

  scrollAnim = requestAnimationFrame(step);
}

// ── Loop infinito: reset silencioso cuando se aleja del set central ──
let resetLock = false;
function checkLoop() {
  if (resetLock) return;
  const setWidth = allItems[N].offsetLeft - allItems[0].offsetLeft;
  const lo = setWidth * 0.4;
  const hi = setWidth * 1.6;

  if (wrap.scrollLeft < lo) {
    resetLock = true;
    wrap.scrollLeft += setWidth;
    activeGlobalIdx += N;
    setTimeout(() => { resetLock = false; }, 50);
  } else if (wrap.scrollLeft > hi) {
    resetLock = true;
    wrap.scrollLeft -= setWidth;
    activeGlobalIdx -= N;
    setTimeout(() => { resetLock = false; }, 50);
  }
}
wrap.addEventListener('scroll', checkLoop, { passive: true });

// ── Hover ──
allItems.forEach((item, i) => {
  item.addEventListener('mouseenter', () => {
    // Elegir el globalIdx más cercano al actual (para que el scroll sea corto)
    const realIdx = parseInt(item.dataset.real);
    const candidates = [realIdx, realIdx + N, realIdx + 2*N];
    const best = candidates.reduce((a, b) =>
      Math.abs(a - activeGlobalIdx) <= Math.abs(b - activeGlobalIdx) ? a : b
    );
    activeGlobalIdx = best;
    updateClasses(best);
    centerItem(best);
  });

  // Click → ir a la página del evento
  let mouseDownX = 0;
  item.addEventListener('mousedown', e => mouseDownX = e.clientX);
  item.addEventListener('mouseup', e => {
    if (Math.abs(e.clientX - mouseDownX) < 6) { // no fue drag
      const ev = EVENTS[parseInt(item.dataset.real)];
      window.location.href = `evento.html?e=${ev.event}&n=${encodeURIComponent(ev.title)}&cat=${encodeURIComponent(ev.cat)}&c=${ev.count}`;
    }
  });
});

// ── Drag para desplazar ──
let isDragging = false, dragStartX = 0, dragStartScroll = 0;
wrap.addEventListener('mousedown', e => {
  isDragging = true;
  dragStartX = e.pageX;
  dragStartScroll = wrap.scrollLeft;
});
wrap.addEventListener('mousemove', e => {
  if (!isDragging) return;
  wrap.scrollLeft = dragStartScroll - (e.pageX - dragStartX);
});
wrap.addEventListener('mouseup', () => { isDragging = false; });
wrap.addEventListener('mouseleave', () => { isDragging = false; });

// ── Init: scroll instantáneo al centro, luego activar ──
document.fonts.ready.then(() => {
  requestAnimationFrame(() => {
    centerItem(activeGlobalIdx, true);
    updateClasses(activeGlobalIdx);
  });
});

// ── Hamburger ──
function toggleMenu() {
  document.getElementById('ham').classList.toggle('open');
  document.getElementById('mobile-menu').classList.toggle('open');
}
</script>
</body>
</html>
